      name="description"
      content="涼風千秋的社群連結：Plurk、X、Facebook、Instagram、pixiv、Discord。"
    />
    <meta name="theme-color" content="#1d1d1f" />
    <meta property="og:title" content="SNS — 涼風千秋" />
    <meta property="og:description" content="涼風千秋的社群連結集合頁" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chiaki.ch/sns/" />
    <link rel="icon" href="/favicon.ico" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        position: relative;
        min-height: 100svh;
        background: #000;
        color: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.16) 25%,
          transparent 25%
        );
        background-size: 3px 3px;
        -webkit-mask-image: linear-gradient(to bottom, #000, 50%, transparent);
        mask-image: linear-gradient(to bottom, #000, 50%, transparent);
      }
      nav,
      main,
      footer {
        position: relative;
        z-index: 1;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── TopBar ───────────────────────── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 20;
        background: rgba(29, 29, 31, 0.92);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid #27272a;
      }
      nav .in {
        max-width: 1080px;
        margin: 0 auto;
        height: 44px;
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 32px;
      }
      nav svg.logo {
        height: 20px;
        width: 20px;
        flex: none;
        display: block;
      }
      nav .links {
        display: flex;
        gap: 28px;
        font-size: 17px;
        font-weight: 600;
      }
      nav .links a {
        opacity: 0.5;
        transition: opacity 0.2s;
      }
      nav .links a:hover {
        opacity: 1;
      }
      @media (max-width: 640px) {
        nav .in {
          gap: 18px;
          padding: 0 16px;
        }
        nav .links {
          gap: 16px;
          font-size: 14px;
        }
      }
      @media (min-width: 768px) {
        nav .in {
          padding: 0 40px;
        }
      }
      @media (min-width: 1024px) {
        nav .in {
          padding: 0 60px;
        }
      }

      /* ── Page ─────────────────────────── */
      main {
        flex: 1;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 96px 20px 40px;
        background: radial-gradient(
          600px 320px at 50% 0,
          rgba(120, 120, 255, 0.1),
          transparent 70%
        );
      }
      header.me {
        text-align: center;
        margin-bottom: 32px;
      }
      .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
      h1 {
        margin-top: 16px;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .bio {
        margin-top: 6px;
        font-size: 14px;
        color: rgba(245, 245, 247, 0.55);
      }

      /* ── Cards ────────────────────────── */
      ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        border-radius: 16px;
        background: #1c1c1e;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.2s,
          border-color 0.2s;
      }
      .card:hover {
        background: #2c2c2e;
        border-color: rgba(255, 255, 255, 0.22);
        transform: translateY(-2px);
      }
      .card:active {
        transform: scale(0.98);
      }
      .badge {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        flex: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 19px;
        color: #fff;
      }
      .badge svg {
        width: 20px;
        height: 20px;
        display: block;
      }
      .t {
        min-width: 0;
      }
      .t b {
        display: block;
        font-size: 16px;
        font-weight: 600;
      }
      .t span {
        display: block;
        font-size: 13px;
        color: rgba(245, 245, 247, 0.5);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .arrow {
        margin-left: auto;
        flex: none;
        opacity: 0.35;
        font-size: 14px;
      }

      .plurk {
        background: #ff574d;
      }
      .x {
        background: #111;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }
      .fb {
        background: #1877f2;
      }
      .ig {
        background: linear-gradient(
          45deg,
          #f09433,
          #e6683c 25%,
          #dc2743 50%,
          #cc2366 75%,
          #bc1888
        );
      }
      .pixiv {
        background: #0096fa;
      }
      .dc {
        background: #5865f2;
      }

      /* Discord：整張卡片點擊複製 */
      .handle {
        color: #f5f5f7;
        font-weight: 600;
      }
      .hint {
        margin-left: auto;
        flex: none;
        font-size: 11px;
        color: rgba(245, 245, 247, 0.4);
      }
      .hint[data-copied='1'] {
        color: #6ee7a0;
      }

      footer {
        padding: 24px;
        text-align: center;
        font-size: 12px;
        color: rgba(245, 245, 247, 0.35);
      }
      footer a:hover {
        color: rgba(245, 245, 247, 0.8);
      }

      /* ── QR code (desktop only) ───────────
         The qr.svg background-image lives inside the min-width media query,
         so browsers below that width never fetch it — pure CSS, no JS needed. */
      .qr {
        display: none;
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 10;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .qr .box {
        width: 160px;
        height: 160px;
        padding: 10px;
        box-sizing: border-box;
        border-radius: 16px;
        background-color: #fff;
      }
      .qr span {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: rgba(245, 245, 247, 0.7);
      }
      @media (min-width: 900px) {
        .qr {
          display: flex;
        }
        .qr .box {
          background-image: url('/sns/qr.svg');
          background-repeat: no-repeat;
          background-position: center;
          background-size: contain;
          background-origin: content-box;
          background-clip: content-box;
        }
      }
    </style>

    <script>
      var card = document.getElementById('dcCard');
      var h = document.getElementById('dcHandle');
      var hint = document.getElementById('dcHint');
      function copyDiscord() {
        navigator.clipboard.writeText(h.textContent).then(function () {
          hint.textContent = 'Copied!';
          hint.dataset.copied = '1';
          setTimeout(function () {
            hint.textContent = 'Click to Copy';
            delete hint.dataset.copied;
          }, 1500);
        });
      }
      card.addEventListener('click', copyDiscord);
      card.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          copyDiscord();
        }
      });
    </script>
